<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head></head>
<body>

<!--
  HEADER FRAGMENT (Industry-Standard)
  ====================================
  Included on EVERY page using: th:replace="~{fragments/header :: header}"
  Uses Inter font (Google Fonts) and custom st-navbar class.
  SVG building icon instead of Bootstrap icon font.
-->
<header th:fragment="header">
    <!-- Google Font: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <!-- Custom CSS -->
    <link th:href="@{/css/style.css}" rel="stylesheet"/>

    <nav class="navbar navbar-expand-lg navbar-dark st-navbar sticky-top">
        <div class="container-fluid px-3">
            <!-- Brand / Logo with SVG -->
            <a class="navbar-brand" href="/">
                <!-- Building SVG Icon -->
                <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="4" y="2" width="16" height="20" rx="2" ry="2"/>
                    <path d="M9 22v-4h6v4"/>
                    <path d="M8 6h.01"/><path d="M16 6h.01"/>
                    <path d="M12 6h.01"/><path d="M12 10h.01"/>
                    <path d="M12 14h.01"/><path d="M16 10h.01"/>
                    <path d="M16 14h.01"/><path d="M8 10h.01"/>
                    <path d="M8 14h.01"/>
                </svg>
                Shivtirth Hostel
            </a>

            <!-- Right side buttons -->
            <div class="d-flex align-items-center gap-2">

                <!-- NOT LOGGED IN → show Login + Register buttons -->
                <th:block th:if="${loggedUser == null}">
                    <a href="/login" class="btn btn-outline-light btn-sm">
                        <!-- Login SVG -->
                        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none"
                             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
                            <polyline points="10 17 15 12 10 7"/>
                            <line x1="15" y1="12" x2="3" y2="12"/>
                        </svg>
                        Login
                    </a>
                    <a href="/register" class="btn btn-primary btn-sm" style="background:var(--primary);">
                        <!-- User Plus SVG -->
                        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none"
                             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                            <circle cx="8.5" cy="7" r="4"/>
                            <line x1="20" y1="8" x2="20" y2="14"/>
                            <line x1="23" y1="11" x2="17" y2="11"/>
                        </svg>
                        Register
                    </a>
                </th:block>

                <!-- ADMIN LOGGED IN -->
                <th:block th:if="${loggedUser != null and loggedUser.role == 'ADMIN'}">
                    <span class="st-user-name text-light d-none d-md-inline">
                        <!-- Gear SVG -->
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="3"/>
                            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                        </svg>
                        Admin
                    </span>
                    <a href="/admin/dashboard" class="btn btn-outline-info btn-sm">Dashboard</a>
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-outline-danger btn-sm">Logout</button>
                    </form>
                </th:block>

                <!-- STUDENT LOGGED IN -->
                <th:block th:if="${loggedUser != null and loggedUser.role == 'USER'}">
                    <span class="st-user-name text-light d-none d-md-inline">
                        <!-- User SVG -->
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                        <span th:text="${loggedUser.name}">User</span>
                    </span>
                    <a href="/dashboard" class="btn btn-outline-info btn-sm">Dashboard</a>
                    <a href="/change-password" class="btn btn-outline-warning btn-sm" title="Change Password">
                        <!-- Key SVG -->
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.78 7.78 5.5 5.5 0 0 1 7.78-7.78zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/>
                        </svg>
                    </a>
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-outline-danger btn-sm">Logout</button>
                    </form>
                </th:block>

            </div>
        </div>
    </nav>
</header>

</body>
</html>
