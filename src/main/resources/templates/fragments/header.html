<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head></head>
<body>

<!--
  HEADER FRAGMENT
  This is included on EVERY page using: th:replace="~{fragments/header :: header}"
  It shows the navbar with logo + login/register/logout buttons.
  The "loggedUser" variable comes from GlobalModelAttributes.java
-->
<header th:fragment="header">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow">
        <div class="container-fluid">
            <!-- Brand / Logo -->
            <a class="navbar-brand fw-bold" href="/">
                <i class="bi bi-building"></i> Shivtirth Hostel
            </a>

            <!-- Right side buttons -->
            <div class="d-flex align-items-center gap-2">

                <!-- NOT LOGGED IN → show Login + Register buttons -->
                <th:block th:if="${loggedUser == null}">
                    <a href="/login" class="btn btn-outline-primary btn-sm">
                        <i class="bi bi-box-arrow-in-right"></i> Login
                    </a>
                    <a href="/register" class="btn btn-success btn-sm">
                        <i class="bi bi-person-plus"></i> Register
                    </a>
                </th:block>

                <!-- ADMIN LOGGED IN → show Dashboard + Logout -->
                <th:block th:if="${loggedUser != null and loggedUser.role == 'ADMIN'}">
                    <span class="text-light small me-2">
                        <i class="bi bi-gear"></i> Admin
                    </span>
                    <a href="/admin/dashboard" class="btn btn-outline-info btn-sm">Dashboard</a>
                    <!-- Logout must be POST (Spring Security requirement) -->
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-outline-danger btn-sm">
                            <i class="bi bi-box-arrow-right"></i> Logout
                        </button>
                    </form>
                </th:block>

                <!-- STUDENT LOGGED IN → show name + Dashboard + Logout -->
                <th:block th:if="${loggedUser != null and loggedUser.role == 'USER'}">
                    <span class="text-light small me-2">
                        <i class="bi bi-person"></i>
                        <span th:text="${loggedUser.name}">User</span>
                    </span>
                    <a href="/dashboard" class="btn btn-outline-info btn-sm">My Dashboard</a>
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-outline-danger btn-sm">
                            <i class="bi bi-box-arrow-right"></i> Logout
                        </button>
                    </form>
                </th:block>

            </div>
        </div>
    </nav>
</header>

</body>
</html>
