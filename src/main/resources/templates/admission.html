<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admission Form - Shivtirth Hostel</title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
</head>
<body class="d-flex flex-column min-vh-100" style="background:#f5f6fa;">
<div th:replace="~{fragments/header :: header}"></div>

<main class="flex-grow-1 py-4">
    <div class="container" style="max-width: 700px;">
        <div class="card shadow border-0">
            <div class="card-body p-4">

                <h4 class="mb-1">
                    <i class="bi bi-clipboard-check"></i> Hostel Admission Form
                </h4>
                <p class="text-muted small mb-4">
                    Fill in your details completely. Admin will review and approve your admission.
                </p>

                <!-- Error message -->
                <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                <form th:action="@{/admission}" th:object="${profile}" method="post" enctype="multipart/form-data">

                    <!-- Personal Information -->
                    <h6 class="text-primary text-uppercase small fw-bold border-bottom pb-2 mb-3">
                        Personal Information
                    </h6>
                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">Date of Birth</label>
                            <input type="date" th:field="*{dateOfBirth}" class="form-control" required/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">Gender</label>
                            <select th:field="*{gender}" class="form-select" required>
                                <option value="">Select Gender</option>
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Aadhar Number</label>
                        <input type="text" th:field="*{aadharNumber}" class="form-control"
                               placeholder="e.g. 1234 5678 9012" maxlength="14"/>
                        <small class="text-muted">Optional but recommended for verification</small>
                    </div>

                    <!-- Profile Photo -->
                    <h6 class="text-primary text-uppercase small fw-bold border-bottom pb-2 mb-3 mt-4">
                        Profile Photo
                    </h6>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Upload Your Photo</label>
                        <input type="file" name="profilePhoto" class="form-control" accept="image/*"/>
                        <small class="text-muted">Upload a passport-size photo (JPG/PNG, max 2MB)</small>
                    </div>

                    <!-- Contact Information -->
                    <h6 class="text-primary text-uppercase small fw-bold border-bottom pb-2 mb-3 mt-4">
                        Contact Information
                    </h6>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Mobile Number</label>
                        <input type="text" th:field="*{phoneNumber}" class="form-control"
                               placeholder="e.g. 9876543210" required/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Permanent Address</label>
                        <textarea th:field="*{address}" class="form-control" rows="2"
                                  placeholder="Your home address" required></textarea>
                    </div>

                    <!-- Academic Details -->
                    <h6 class="text-primary text-uppercase small fw-bold border-bottom pb-2 mb-3 mt-4">
                        Academic Details
                    </h6>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">College Name</label>
                        <input type="text" th:field="*{collegeName}" class="form-control"
                               placeholder="e.g. ABC College of Engineering" required/>
                    </div>
                    <div class="row g-3 mb-3">
                        <div class="col-md-4">
                            <label class="form-label small fw-bold">Course</label>
                            <input type="text" th:field="*{course}" class="form-control"
                                   placeholder="e.g. B.Tech, BCA" required/>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small fw-bold">Year of Study</label>
                            <select th:field="*{yearOfStudy}" class="form-select" required>
                                <option value="">Select</option>
                                <option value="1st Year">1st Year</option>
                                <option value="2nd Year">2nd Year</option>
                                <option value="3rd Year">3rd Year</option>
                                <option value="4th Year">4th Year</option>
                                <option value="5th Year">5th Year</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small fw-bold">Academic Year</label>
                            <input type="text" th:field="*{academicYear}" class="form-control"
                                   placeholder="e.g. 2025-26" required/>
                        </div>
                    </div>

                    <!-- Parent / Guardian Details -->
                    <h6 class="text-primary text-uppercase small fw-bold border-bottom pb-2 mb-3 mt-4">
                        Parent / Guardian Details
                    </h6>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Parent / Guardian Name</label>
                        <input type="text" th:field="*{parentName}" class="form-control"
                               placeholder="Parent full name" required/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Parent Contact Number</label>
                        <input type="text" th:field="*{parentContact}" class="form-control"
                               placeholder="Parent mobile number" required/>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 fw-bold mt-2">
                        <i class="bi bi-send"></i> Submit Admission Form
                    </button>
                </form>

            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
