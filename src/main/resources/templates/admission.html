<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admission Form - Shivtirth Hostel</title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
</head>
<body class="d-flex flex-column min-vh-100" style="background:#f5f6fa;">
<div th:replace="~{fragments/header :: header}"></div>

<main class="flex-grow-1 py-4">
    <div class="container" style="max-width: 700px;">
        <div class="card shadow border-0">
            <div class="card-body p-4">

                <h4 class="mb-1">
                    <i class="bi bi-clipboard-check"></i> Hostel Admission Form
                </h4>
                <p class="text-muted small mb-4">
                    Fill in your details completely. Admin will review and approve your admission.
                </p>

                <!-- Error message -->
                <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                <!--
                    IMPORTANT: This form uses method="post" WITHOUT enctype="multipart/form-data".
                    Photo upload is handled separately via JavaScript to avoid HTTP 413 errors
                    caused by Spring Boot 4.x multipart configuration issues.
                -->
                <form id="admissionForm" th:action="@{/admission}" th:object="${profile}" method="post">

                    <!-- Hidden field to store the uploaded photo path -->
                    <input type="hidden" name="profilePhotoPath" id="profilePhotoPath" th:field="*{profilePhotoPath}"/>

                    <!-- Personal Information -->
                    <h6 class="text-primary text-uppercase small fw-bold border-bottom pb-2 mb-3">
                        Personal Information
                    </h6>
                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">Date of Birth</label>
                            <input type="date" th:field="*{dateOfBirth}" class="form-control" required/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">Gender</label>
                            <select th:field="*{gender}" class="form-select" required>
                                <option value="">Select Gender</option>
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Aadhar Number</label>
                        <input type="text" th:field="*{aadharNumber}" class="form-control"
                               placeholder="e.g. 1234 5678 9012" maxlength="14"/>
                        <small class="text-muted">Optional but recommended for verification</small>
                    </div>

                    <!-- Profile Photo (uploaded via AJAX, not as part of this form) -->
                    <h6 class="text-primary text-uppercase small fw-bold border-bottom pb-2 mb-3 mt-4">
                        Profile Photo
                    </h6>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Upload Your Photo</label>
                        <input type="file" id="profilePhotoFile" class="form-control" accept="image/*"/>
                        <small class="text-muted">Upload a passport-size photo (JPG/PNG, max 10MB)</small>
                        <div id="photoStatus" class="small mt-1" style="display:none;"></div>
                    </div>

                    <!-- Contact Information -->
                    <h6 class="text-primary text-uppercase small fw-bold border-bottom pb-2 mb-3 mt-4">
                        Contact Information
                    </h6>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Mobile Number</label>
                        <input type="text" th:field="*{phoneNumber}" class="form-control"
                               placeholder="e.g. 9876543210" required/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Permanent Address</label>
                        <textarea th:field="*{address}" class="form-control" rows="2"
                                  placeholder="Your home address" required></textarea>
                    </div>

                    <!-- Academic Details -->
                    <h6 class="text-primary text-uppercase small fw-bold border-bottom pb-2 mb-3 mt-4">
                        Academic Details
                    </h6>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">College Name</label>
                        <input type="text" th:field="*{collegeName}" class="form-control"
                               placeholder="e.g. ABC College of Engineering" required/>
                    </div>
                    <div class="row g-3 mb-3">
                        <div class="col-md-4">
                            <label class="form-label small fw-bold">Course</label>
                            <input type="text" th:field="*{course}" class="form-control"
                                   placeholder="e.g. B.Tech, BCA" required/>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small fw-bold">Year of Study</label>
                            <select th:field="*{yearOfStudy}" class="form-select" required>
                                <option value="">Select</option>
                                <option value="1st Year">1st Year</option>
                                <option value="2nd Year">2nd Year</option>
                                <option value="3rd Year">3rd Year</option>
                                <option value="4th Year">4th Year</option>
                                <option value="5th Year">5th Year</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small fw-bold">Academic Year</label>
                            <input type="text" th:field="*{academicYear}" class="form-control"
                                   placeholder="e.g. 2025-26" required/>
                        </div>
                    </div>

                    <!-- Parent / Guardian Details -->
                    <h6 class="text-primary text-uppercase small fw-bold border-bottom pb-2 mb-3 mt-4">
                        Parent / Guardian Details
                    </h6>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Parent / Guardian Name</label>
                        <input type="text" th:field="*{parentName}" class="form-control"
                               placeholder="Parent full name" required/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Parent Contact Number</label>
                        <input type="text" th:field="*{parentContact}" class="form-control"
                               placeholder="Parent mobile number" required/>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 fw-bold mt-2" id="submitBtn">
                        <i class="bi bi-send"></i> Submit Admission Form
                    </button>
                </form>

            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
/**
 * PHOTO UPLOAD HANDLER
 * --------------------
 * When user selects a photo, it is uploaded via AJAX (fetch) to /admission/uploadPhoto.
 * The server saves the file and returns the file path.
 * The path is stored in a hidden field and submitted with the regular form.
 *
 * This approach avoids enctype="multipart/form-data" on the main form,
 * which was causing HTTP 413 errors in Spring Boot 4.x.
 */
document.getElementById('profilePhotoFile').addEventListener('change', function() {
    var file = this.files[0];
    var statusDiv = document.getElementById('photoStatus');

    if (!file) return;

    // Validate file size (max 10MB)
    if (file.size > 10 * 1024 * 1024) {
        statusDiv.className = 'small mt-1 text-danger';
        statusDiv.textContent = 'File too large! Max 10MB allowed.';
        statusDiv.style.display = 'block';
        this.value = '';
        return;
    }

    // Show uploading status
    statusDiv.className = 'small mt-1 text-info';
    statusDiv.textContent = 'Uploading photo...';
    statusDiv.style.display = 'block';

    // Upload via AJAX
    var formData = new FormData();
    formData.append('profilePhoto', file);

    fetch('/admission/uploadPhoto', {
        method: 'POST',
        body: formData
    })
    .then(function(response) {
        if (!response.ok) throw new Error('Upload failed (status ' + response.status + ')');
        return response.text();
    })
    .then(function(photoPath) {
        document.getElementById('profilePhotoPath').value = photoPath;
        statusDiv.className = 'small mt-1 text-success';
        statusDiv.textContent = '✅ Photo uploaded successfully!';
    })
    .catch(function(error) {
        statusDiv.className = 'small mt-1 text-danger';
        statusDiv.textContent = '❌ Upload failed: ' + error.message;
        document.getElementById('profilePhotoPath').value = '';
    });
});
</script>
</body>
</html>
