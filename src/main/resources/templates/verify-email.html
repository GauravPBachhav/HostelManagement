<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Verify Email - Shivtirth Hostel</title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="d-flex flex-column min-vh-100">
<div th:replace="~{fragments/header :: header}"></div>

<main class="flex-grow-1 d-flex align-items-center justify-content-center py-5" style="background:var(--bg);">
    <div class="st-card st-animate-in" style="width:100%; max-width:440px;">
        <div class="p-4 text-center">

            <!-- Email icon -->
            <div style="width:64px; height:64px; border-radius:50%; background:linear-gradient(135deg,#4361ee,#3a0ca3); display:inline-flex; align-items:center; justify-content:center; margin-bottom:14px;">
                <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 24 24" fill="none"
                     stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="22,7 12,13 2,7"/>
                </svg>
            </div>
            <h4 class="fw-bold mb-1">Verify Your Email</h4>
            <p class="text-muted small">A 6-digit OTP has been sent to</p>
            <p class="fw-bold mb-3" th:text="${email}">email@example.com</p>

            <!-- Alerts -->
            <div th:if="${success}" class="st-alert" style="background:rgba(6,214,160,0.1); border-left:4px solid #06d6a0; margin-bottom:12px; text-align:left;">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#06d6a0" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                <span class="small" th:text="${success}"></span>
            </div>
            <div th:if="${error}" class="st-alert" style="background:rgba(239,71,111,0.1); border-left:4px solid #ef476f; margin-bottom:12px; text-align:left;">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ef476f" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                <span class="small" th:text="${error}"></span>
            </div>

            <!-- OTP Form -->
            <form th:action="@{/verify-email}" method="post">
                <input type="hidden" name="email" th:value="${email}"/>
                <div class="mb-3">
                    <input type="text" name="otp" class="form-control st-form-control text-center fw-bold"
                           placeholder="Enter 6-digit OTP" maxlength="6"
                           style="font-size:1.5rem; letter-spacing:8px;" required autofocus/>
                </div>
                <button type="submit" class="btn st-btn st-btn-primary w-100 py-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
                    Verify Email
                </button>
            </form>

            <div class="mt-3">
                <p class="text-muted small mb-1">Didn't receive the code?</p>
                <a th:href="@{/resend-otp(email=${email})}" class="small fw-bold" style="color:var(--primary);">
                    <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
                    Resend OTP
                </a>
            </div>

            <p class="text-muted mt-3" style="font-size:0.75rem;">
                OTP is valid for 10 minutes. Check spam folder if not received.
            </p>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
