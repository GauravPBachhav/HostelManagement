<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register - Shivtirth Hostel</title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="d-flex flex-column min-vh-100">
<div th:replace="~{fragments/header :: header}"></div>

<main class="flex-grow-1 d-flex align-items-center justify-content-center py-5"
      style="background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #3a0ca3 100%); position:relative; overflow:hidden;">

    <!-- Decorative circles -->
    <div style="position:absolute; top:-100px; left:-60px; width:300px; height:300px; border-radius:50%; background:rgba(67,97,238,0.1);"></div>
    <div style="position:absolute; bottom:-80px; right:-40px; width:250px; height:250px; border-radius:50%; background:rgba(247,37,133,0.08);"></div>

    <div class="st-glass-card st-animate-in" style="width:100%; max-width:440px; position:relative; z-index:1;">
        <div class="p-4">

            <!-- Header with SVG -->
            <div class="text-center mb-3">
                <div style="width:56px; height:56px; border-radius:50%; background:linear-gradient(135deg,#06d6a0,#05a17c); display:inline-flex; align-items:center; justify-content:center; margin-bottom:10px;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none"
                         stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                        <circle cx="8.5" cy="7" r="4"/>
                        <line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/>
                    </svg>
                </div>
                <h4 class="mb-0">Create Account</h4>
                <p class="text-muted small mb-0">Register to apply for hostel admission</p>
            </div>

            <!-- Error -->
            <div th:if="${error}" class="st-alert" style="background:rgba(239,71,111,0.1); border-left:4px solid #ef476f; margin-bottom:12px;">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ef476f" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                <span class="small" th:text="${error}"></span>
            </div>

            <!-- Registration Form -->
            <form th:action="@{/regForm}" method="post">
                <div class="mb-3">
                    <label class="st-form-label">Full Name</label>
                    <input type="text" name="name" class="form-control st-form-control"
                           placeholder="Your full name" required/>
                </div>
                <div class="mb-3">
                    <label class="st-form-label">Email Address</label>
                    <input type="email" name="email" class="form-control st-form-control"
                           placeholder="you@example.com" required/>
                </div>
                <div class="mb-3">
                    <label class="st-form-label">Password</label>
                    <input type="password" name="password" class="form-control st-form-control"
                           placeholder="Create a strong password" required/>
                </div>
                <button type="submit" class="btn st-btn st-btn-success w-100 py-2" style="font-size:0.95rem; color:#fff; background:#06d6a0;">
                    Register Now
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
                    </svg>
                </button>
            </form>

            <div class="text-center mt-3 small text-muted">
                Already have an account? <a href="/login" class="fw-600">Login here</a>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
