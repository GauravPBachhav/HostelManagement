<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register - Shivtirth Hostel</title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
</head>
<body class="d-flex flex-column min-vh-100" style="background:#f5f6fa;">
<div th:replace="~{fragments/header :: header}"></div>

<main class="flex-grow-1 d-flex align-items-center justify-content-center py-5">
    <div class="card shadow border-0" style="width: 100%; max-width: 440px;">
        <div class="card-body p-4">

            <h4 class="text-center mb-1">
                <i class="bi bi-person-plus"></i> Create Account
            </h4>
            <p class="text-center text-muted small mb-3">
                Register to apply for hostel admission.
            </p>

            <!-- Error message (e.g., email already registered) -->
            <div th:if="${error}" class="alert alert-danger py-2 text-center small"
                 th:text="${error}"></div>

            <!--
              REGISTRATION FORM
              - th:action adds CSRF token
              - th:object="${user}" binds to the User object
              - th:field="*{name}" auto-fills the input with user.name
            -->
            <form th:action="@{/regForm}" th:object="${user}" method="post">
                <div class="mb-3">
                    <label class="form-label small fw-bold">Full Name</label>
                    <input type="text" th:field="*{name}" class="form-control"
                           placeholder="Your full name" required/>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold">Email Address</label>
                    <input type="email" th:field="*{email}" class="form-control"
                           placeholder="you@example.com" required/>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold">Password</label>
                    <input type="password" th:field="*{password}" class="form-control"
                           placeholder="Create password" required/>
                </div>
                <button type="submit" class="btn btn-success w-100 fw-bold">
                    Register Now <i class="bi bi-arrow-right"></i>
                </button>
            </form>

            <div class="text-center mt-3 small text-muted">
                Already have an account? <a href="/login">Login here</a>
            </div>

        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
