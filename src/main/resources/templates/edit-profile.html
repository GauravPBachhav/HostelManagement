<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Profile - Shivtirth Hostel</title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="d-flex flex-column min-vh-100">
<div th:replace="~{fragments/header :: header}"></div>

<main class="flex-grow-1 d-flex align-items-center justify-content-center py-5" style="background:var(--bg);">
    <div class="st-card st-animate-in" style="width:100%; max-width:520px;">
        <div class="p-4">

            <!-- Header -->
            <div class="text-center mb-3">
                <div style="width:56px; height:56px; border-radius:50%; background:linear-gradient(135deg,#4361ee,#3a0ca3); display:inline-flex; align-items:center; justify-content:center; margin-bottom:10px;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none"
                         stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                </div>
                <h4 class="fw-bold mb-0">Edit Profile</h4>
                <p class="text-muted small mb-0">Update your contact details</p>
            </div>

            <!-- Alerts -->
            <div th:if="${success}" class="st-alert" style="background:rgba(6,214,160,0.1); border-left:4px solid #06d6a0; margin-bottom:12px;">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#06d6a0" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                <span class="small" th:text="${success}"></span>
            </div>
            <div th:if="${error}" class="st-alert" style="background:rgba(239,71,111,0.1); border-left:4px solid #ef476f; margin-bottom:12px;">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ef476f" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                <span class="small" th:text="${error}"></span>
            </div>

            <!-- Read-only info -->
            <div class="mb-3 p-3 rounded" style="background:var(--bg);">
                <small class="text-muted d-block">
                    <strong>Name:</strong> <span th:text="${profile.user.name}">Name</span>
                </small>
                <small class="text-muted d-block">
                    <strong>Email:</strong> <span th:text="${profile.user.email}">email</span>
                </small>
                <small class="text-muted d-block">
                    <strong>College:</strong> <span th:text="${profile.collegeName}">-</span>
                </small>
                <small class="text-muted d-block">
                    <strong>Course:</strong> <span th:text="${profile.course}">-</span> (<span th:text="${profile.yearOfStudy}">-</span> Year)
                </small>
            </div>

            <!-- Editable Form -->
            <form th:action="@{/edit-profile}" method="post">
                <div class="mb-3">
                    <label class="st-form-label">Phone Number</label>
                    <input type="text" name="phoneNumber" class="form-control st-form-control"
                           th:value="${profile.phoneNumber}" placeholder="Your phone number" required/>
                </div>
                <div class="mb-3">
                    <label class="st-form-label">Address</label>
                    <textarea name="address" class="form-control st-form-control" rows="2"
                              th:text="${profile.address}" placeholder="Your address" required></textarea>
                </div>
                <div class="mb-3">
                    <label class="st-form-label">Parent Contact</label>
                    <input type="text" name="parentContact" class="form-control st-form-control"
                           th:value="${profile.parentContact}" placeholder="Parent's phone number" required/>
                </div>
                <button type="submit" class="btn st-btn st-btn-primary w-100 py-2" style="font-size:0.95rem;">
                    Save Changes
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
                </button>
            </form>

            <div class="text-center mt-3">
                <a href="/dashboard" class="text-muted small">
                    <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                    Back to Dashboard
                </a>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
