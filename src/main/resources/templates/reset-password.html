<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Reset Password - Shivtirth Hostel</title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body class="d-flex flex-column min-vh-100">
<div th:replace="~{fragments/header :: header}"></div>

<main class="flex-grow-1 d-flex align-items-center justify-content-center py-5"
      style="background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #3a0ca3 100%); position:relative; overflow:hidden;">

    <!-- Decorative circles -->
    <div style="position:absolute; top:-100px; right:-60px; width:300px; height:300px; border-radius:50%; background:rgba(67,97,238,0.1);"></div>
    <div style="position:absolute; bottom:-80px; left:-40px; width:250px; height:250px; border-radius:50%; background:rgba(247,37,133,0.08);"></div>

    <div class="st-glass-card st-animate-in" style="width:100%; max-width:420px; position:relative; z-index:1;">
        <div class="p-4">

            <!-- Header -->
            <div class="text-center mb-3">
                <div style="width:56px; height:56px; border-radius:50%; background:linear-gradient(135deg,#06d6a0,#118ab2); display:inline-flex; align-items:center; justify-content:center; margin-bottom:10px;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none"
                         stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                    </svg>
                </div>
                <h4 class="mb-0">Set New Password</h4>
                <p class="text-muted small mb-0">OTP verified! Create your new password.</p>
            </div>

            <!-- Alerts -->
            <div th:if="${error}" class="st-alert" style="background:rgba(239,71,111,0.1); border-left:4px solid #ef476f; margin-bottom:12px;">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ef476f" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                <span class="small" th:text="${error}"></span>
            </div>

            <!-- Reset Form -->
            <form action="/reset-password" method="post">
                <input type="hidden" name="email" th:value="${email}"/>
                <div class="mb-3">
                    <label class="st-form-label">New Password</label>
                    <input type="password" name="password" class="form-control st-form-control"
                           placeholder="Enter new password" minlength="6" required/>
                </div>
                <div class="mb-3">
                    <label class="st-form-label">Confirm Password</label>
                    <input type="password" name="confirmPassword" class="form-control st-form-control"
                           placeholder="Re-enter new password" minlength="6" required/>
                </div>
                <button type="submit" class="btn st-btn st-btn-primary w-100 py-2" style="font-size:0.95rem;">
                    Reset Password
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
                </button>
            </form>

        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
