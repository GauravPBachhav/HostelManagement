<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Forgot Password - Shivtirth Hostel</title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body class="d-flex flex-column min-vh-100">
<div th:replace="~{fragments/header :: header}"></div>

<main class="flex-grow-1 d-flex align-items-center justify-content-center py-5"
      style="background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #3a0ca3 100%); position:relative; overflow:hidden;">

    <!-- Decorative circles -->
    <div style="position:absolute; top:-100px; right:-60px; width:300px; height:300px; border-radius:50%; background:rgba(67,97,238,0.1);"></div>
    <div style="position:absolute; bottom:-80px; left:-40px; width:250px; height:250px; border-radius:50%; background:rgba(247,37,133,0.08);"></div>

    <div class="st-glass-card st-animate-in" style="width:100%; max-width:420px; position:relative; z-index:1;">
        <div class="p-4">

            <!-- Header -->
            <div class="text-center mb-3">
                <div style="width:56px; height:56px; border-radius:50%; background:linear-gradient(135deg,#ef476f,#f77f00); display:inline-flex; align-items:center; justify-content:center; margin-bottom:10px;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none"
                         stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/>
                    </svg>
                </div>
                <h4 class="mb-0">Forgot Password</h4>
                <p class="text-muted small mb-0" th:text="${step == 'otp'} ? 'Enter the OTP sent to your email' : 'Enter your registered email to receive OTP'"></p>
            </div>

            <!-- Alerts -->
            <div th:if="${error}" class="st-alert" style="background:rgba(239,71,111,0.1); border-left:4px solid #ef476f; margin-bottom:12px;">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ef476f" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                <span class="small" th:text="${error}"></span>
            </div>
            <div th:if="${success}" class="st-alert" style="background:rgba(6,214,160,0.1); border-left:4px solid #06d6a0; margin-bottom:12px;">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#06d6a0" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                <span class="small" th:text="${success}"></span>
            </div>

            <!-- STEP 1: Enter Email -->
            <div th:if="${step == 'email'}">
                <form action="/forgot-password" method="post">
                    <div class="mb-3">
                        <label class="st-form-label">Registered Email Address</label>
                        <input type="email" name="email" class="form-control st-form-control"
                               placeholder="you@example.com" required/>
                    </div>
                    <button type="submit" class="btn st-btn st-btn-primary w-100 py-2" style="font-size:0.95rem;">
                        Send OTP
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                             stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                    </button>
                </form>
            </div>

            <!-- STEP 2: Enter OTP -->
            <div th:if="${step == 'otp'}">
                <form action="/forgot-password/verify" method="post">
                    <input type="hidden" name="email" th:value="${email}"/>
                    <div class="mb-3">
                        <label class="st-form-label">Email</label>
                        <input type="email" class="form-control st-form-control" th:value="${email}" disabled/>
                    </div>
                    <div class="mb-3">
                        <label class="st-form-label">Enter 6-digit OTP</label>
                        <input type="text" name="otp" class="form-control st-form-control text-center"
                               placeholder="• • • • • •" maxlength="6" required
                               style="font-size:1.4rem; letter-spacing:8px; font-weight:700;"/>
                    </div>
                    <button type="submit" class="btn st-btn st-btn-primary w-100 py-2" style="font-size:0.95rem;">
                        Verify OTP
                    </button>
                </form>
                <div class="text-center mt-2">
                    <form action="/forgot-password/resend" method="post" class="d-inline">
                        <input type="hidden" name="email" th:value="${email}"/>
                        <button type="submit" class="btn btn-link text-muted small p-0">Resend OTP</button>
                    </form>
                </div>
            </div>

            <!-- Back to Login -->
            <div class="text-center mt-3 small">
                <a href="/login" class="text-muted">
                    <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                    Back to Login
                </a>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
