<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Student Application - Admin</title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <style>
        * { font-family:'Inter',sans-serif; }
        body { background:#f0f2f5; margin:0; overflow-x:hidden; }
        .sb { position:fixed; top:0; left:0; width:240px; height:100vh; background:#1a1a2e; color:#fff; display:flex; flex-direction:column; z-index:1000; transition:transform .3s; }
        .sb-brand { padding:24px 20px 18px; border-bottom:1px solid rgba(255,255,255,0.08); display:flex; align-items:center; gap:10px; }
        .sb-brand i { font-size:24px; color:#a78bfa; }
        .sb-brand span { font-size:18px; font-weight:800; letter-spacing:0.5px; }
        .sb-nav { flex:1; padding:12px 0; overflow-y:auto; }
        .sb-item { display:flex; align-items:center; gap:12px; padding:11px 22px; color:rgba(255,255,255,0.55); font-size:14px; font-weight:500; cursor:pointer; border-left:3px solid transparent; transition:all .2s; text-decoration:none; }
        .sb-item:hover { color:#fff; background:rgba(255,255,255,0.06); }
        .sb-item.active { color:#fff; background:rgba(167,139,250,0.15); border-left-color:#a78bfa; }
        .sb-item i { font-size:17px; width:22px; text-align:center; }
        .sb-sep { height:1px; background:rgba(255,255,255,0.08); margin:8px 20px; }
        .sb-footer { padding:16px 20px; border-top:1px solid rgba(255,255,255,0.08); }
        .main { margin-left:240px; min-height:100vh; }
        .top-bar { background:#fff; padding:14px 28px; display:flex; align-items:center; gap:16px; border-bottom:1px solid #e5e7eb; position:sticky; top:0; z-index:100; }
        .top-bar .right { margin-left:auto; display:flex; align-items:center; gap:12px; }
        .content { padding:20px 28px; max-width:1000px; }
        .sb-toggle { display:none; background:none; border:none; font-size:24px; color:#333; cursor:pointer; }
        @media(max-width:991px) {
            .sb { transform:translateX(-100%); }
            .sb.open { transform:translateX(0); }
            .main { margin-left:0; }
            .content { padding:16px; }
            .sb-toggle { display:block; }
            .sb-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.4); z-index:999; display:none; }
            .sb-overlay.show { display:block; }
        }
    </style>
</head>
<body>
<div class="sb-overlay" id="sbOverlay" onclick="toggleSidebar()"></div>
<aside class="sb" id="sidebar">
    <div class="sb-brand"><i class="bi bi-building"></i><span>HOSTEL</span></div>
    <nav class="sb-nav">
        <a class="sb-item active" href="/admin/dashboard"><i class="bi bi-speedometer2"></i> Dashboard</a>
        <div class="sb-sep"></div>
        <a class="sb-item" href="/admin/facilities"><i class="bi bi-image"></i> Facilities</a>
        <a class="sb-item" href="/admin/records"><i class="bi bi-archive"></i> Records</a>
    </nav>
    <div class="sb-footer">
        <form action="/logout" method="post" style="margin:0;">
            <button type="submit" style="background:none;border:none;cursor:pointer;color:rgba(255,255,255,0.5);font-size:13px;display:flex;align-items:center;gap:8px;padding:0;font-family:inherit;">
                <i class="bi bi-box-arrow-left"></i> Logout
            </button>
        </form>
    </div>
</aside>

<div class="main">
    <div class="top-bar">
        <button class="sb-toggle" onclick="toggleSidebar()"><i class="bi bi-list"></i></button>
        <h6 class="mb-0 fw-bold"><i class="bi bi-person-badge"></i> Student Application</h6>
        <div class="right">
            <a href="/admin/dashboard" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i> Dashboard</a>
        </div>
    </div>

    <div class="content">
        <!-- STATUS BADGE -->
        <div class="mb-3">
            <span class="badge fs-6"
                  th:classappend="${profile.status.name() == 'PENDING'} ? 'bg-warning text-dark' :
                                  (${profile.status.name() == 'APPROVED'} ? 'bg-success' : 'bg-danger')"
                  th:text="${profile.status}">STATUS</span>
        </div>

        <div class="row g-4">
            <!-- LEFT COLUMN: Photo + Quick Info -->
            <div class="col-md-4">
                <div class="card shadow-sm border-0 text-center">
                    <div class="card-body">
                        <div class="mb-3">
                            <div th:if="${profile.profilePhotoPath != null}">
                                <img th:src="@{'/uploads/' + ${profile.profilePhotoPath}}"
                                     alt="Profile Photo" class="rounded-circle shadow"
                                     style="width:150px;height:150px;object-fit:cover;"/>
                            </div>
                            <div th:if="${profile.profilePhotoPath == null}"
                                 class="bg-secondary text-white rounded-circle d-inline-flex align-items-center justify-content-center"
                                 style="width:150px; height:150px; font-size:48px;">
                                <i class="bi bi-person"></i>
                            </div>
                        </div>
                        <h4 class="mb-1" th:text="${profile.user.name}">Student Name</h4>
                        <p class="text-muted small mb-2" th:text="${profile.user.email}">email</p>
                        <div class="mb-2">
                            <span class="badge bg-primary" th:text="${profile.course}">Course</span>
                            <span class="badge bg-info" th:text="${profile.yearOfStudy}">Year</span>
                        </div>
                        <div th:if="${profile.gender != null}">
                            <span class="badge bg-secondary" th:text="${profile.gender}">Gender</span>
                        </div>
                    </div>
                </div>

                <!-- ACTIONS (only for PENDING) -->
                <div th:if="${profile.status.name() == 'PENDING'}" class="card shadow-sm border-0 mt-3">
                    <div class="card-body">
                        <h6 class="card-title text-uppercase small fw-bold text-muted">Actions</h6>
                        <form th:action="@{/admin/approve/{id}(id=${profile.id})}" method="post" class="mb-2">
                            <div class="mb-2">
                                <label class="form-label small fw-bold">Assign Room</label>
                                <select name="roomId" class="form-select form-select-sm">
                                    <option value="">No room</option>
                                    <option th:each="r : ${availableRooms}" th:value="${r.id}"
                                            th:text="${r.roomNumber + ' (' + r.roomType + ' - ₹' + r.monthlyRent + '/mo)'}">
                                    </option>
                                </select>
                            </div>
                            <button type="submit" class="btn btn-success w-100">
                                <i class="bi bi-check-circle"></i> Approve Admission
                            </button>
                        </form>
                        <form th:action="@{/admin/reject/{id}(id=${profile.id})}" method="post">
                            <button type="submit" class="btn btn-outline-danger w-100"
                                    onclick="return confirm('Are you sure you want to reject this student?')">
                                <i class="bi bi-x-circle"></i> Reject Admission
                            </button>
                        </form>
                    </div>
                </div>

                <!-- DOWNLOAD PDF (always visible) -->
                <div class="card shadow-sm border-0 mt-3">
                    <div class="card-body text-center">
                        <a th:href="@{/admin/student/{id}/pdf(id=${profile.id})}" class="btn btn-outline-primary w-100">
                            <i class="bi bi-file-earmark-pdf"></i> Download Admission PDF
                        </a>
                    </div>
                </div>

                <!-- ROOM INFO -->
                <div th:if="${profile.room != null}" class="card shadow-sm border-0 mt-3">
                    <div class="card-body">
                        <h6 class="card-title text-uppercase small fw-bold text-muted">
                            <i class="bi bi-door-open"></i> Assigned Room
                        </h6>
                        <table class="table table-sm table-borderless mb-0">
                            <tr><td class="text-muted">Room No</td><td class="fw-bold" th:text="${profile.room.roomNumber}"></td></tr>
                            <tr><td class="text-muted">Type</td><td th:text="${profile.room.roomType}"></td></tr>
                            <tr><td class="text-muted">Floor</td><td th:text="${profile.room.floor}"></td></tr>
                            <tr><td class="text-muted">Rent</td><td>&#8377;<span th:text="${profile.room.monthlyRent}"></span>/month</td></tr>
                        </table>
                    </div>
                </div>
            </div>

            <!-- RIGHT COLUMN: Full Details -->
            <div class="col-md-8">
                <!-- PERSONAL -->
                <div class="card shadow-sm border-0 mb-3">
                    <div class="card-header bg-white border-0">
                        <h6 class="mb-0 text-uppercase small fw-bold text-muted">
                            <i class="bi bi-person-badge"></i> Personal Information
                        </h6>
                    </div>
                    <div class="card-body pt-0">
                        <div class="row g-3">
                            <div class="col-md-6"><label class="text-muted small">Full Name</label><p class="fw-bold mb-0" th:text="${profile.user.name}">-</p></div>
                            <div class="col-md-6"><label class="text-muted small">Email</label><p class="fw-bold mb-0" th:text="${profile.user.email}">-</p></div>
                            <div class="col-md-6"><label class="text-muted small">Mobile Number</label><p class="fw-bold mb-0" th:text="${profile.phoneNumber}">-</p></div>
                            <div class="col-md-6" th:if="${profile.dateOfBirth != null}"><label class="text-muted small">Date of Birth</label><p class="fw-bold mb-0" th:text="${profile.dateOfBirth}">-</p></div>
                            <div class="col-md-6" th:if="${profile.gender != null}"><label class="text-muted small">Gender</label><p class="fw-bold mb-0" th:text="${profile.gender}">-</p></div>
                            <div class="col-md-6" th:if="${profile.aadharNumber != null}"><label class="text-muted small">Aadhar Number</label><p class="fw-bold mb-0" th:text="${profile.aadharNumber}">-</p></div>
                            <div class="col-12"><label class="text-muted small">Permanent Address</label><p class="fw-bold mb-0" th:text="${profile.address}">-</p></div>
                        </div>
                    </div>
                </div>

                <!-- ACADEMIC -->
                <div class="card shadow-sm border-0 mb-3">
                    <div class="card-header bg-white border-0">
                        <h6 class="mb-0 text-uppercase small fw-bold text-muted">
                            <i class="bi bi-mortarboard"></i> Academic Details
                        </h6>
                    </div>
                    <div class="card-body pt-0">
                        <div class="row g-3">
                            <div class="col-md-6"><label class="text-muted small">College Name</label><p class="fw-bold mb-0" th:text="${profile.collegeName}">-</p></div>
                            <div class="col-md-6"><label class="text-muted small">Course</label><p class="fw-bold mb-0" th:text="${profile.course}">-</p></div>
                            <div class="col-md-6"><label class="text-muted small">Year of Study</label><p class="fw-bold mb-0" th:text="${profile.yearOfStudy}">-</p></div>
                            <div class="col-md-6" th:if="${profile.academicYear != null}"><label class="text-muted small">Academic Year</label><p class="fw-bold mb-0" th:text="${profile.academicYear}">-</p></div>
                        </div>
                    </div>
                </div>

                <!-- PARENT -->
                <div class="card shadow-sm border-0 mb-3">
                    <div class="card-header bg-white border-0">
                        <h6 class="mb-0 text-uppercase small fw-bold text-muted">
                            <i class="bi bi-people"></i> Parent / Guardian Details
                        </h6>
                    </div>
                    <div class="card-body pt-0">
                        <div class="row g-3">
                            <div class="col-md-6"><label class="text-muted small">Parent / Guardian Name</label><p class="fw-bold mb-0" th:text="${profile.parentName}">-</p></div>
                            <div class="col-md-6"><label class="text-muted small">Parent Contact Number</label><p class="fw-bold mb-0" th:text="${profile.parentContact}">-</p></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sbOverlay').classList.toggle('show');
}
</script>
</body>
</html>
