<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Student Application - Admin</title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
</head>
<body class="d-flex flex-column min-vh-100" style="background:#f5f6fa;">
<div th:replace="~{fragments/header :: header}"></div>

<main class="flex-grow-1 py-4">
    <div class="container" style="max-width: 900px;">

        <!-- BACK BUTTON -->
        <a href="/admin/dashboard" class="btn btn-outline-secondary btn-sm mb-3">
            <i class="bi bi-arrow-left"></i> Back to Dashboard
        </a>

        <!-- STATUS BADGE -->
        <div class="mb-3">
            <span class="badge fs-6"
                  th:classappend="${profile.status.name() == 'PENDING'} ? 'bg-warning text-dark' :
                                  (${profile.status.name() == 'APPROVED'} ? 'bg-success' : 'bg-danger')"
                  th:text="${profile.status}">STATUS</span>
        </div>

        <div class="row g-4">
            <!-- LEFT COLUMN: Photo + Quick Info -->
            <div class="col-md-4">
                <div class="card shadow-sm border-0 text-center">
                    <div class="card-body">
                        <!-- Profile Photo -->
                        <div th:if="${profile.profilePhoto != null}" class="mb-3">
                            <img th:src="@{'/' + ${profile.profilePhoto}}"
                                 alt="Profile Photo"
                                 class="rounded-circle shadow"
                                 style="width:150px; height:150px; object-fit:cover;"/>
                        </div>
                        <div th:if="${profile.profilePhoto == null}" class="mb-3">
                            <div class="bg-secondary text-white rounded-circle d-inline-flex align-items-center justify-content-center"
                                 style="width:150px; height:150px; font-size:48px;">
                                <i class="bi bi-person"></i>
                            </div>
                        </div>

                        <h4 class="mb-1" th:text="${profile.user.name}">Student Name</h4>
                        <p class="text-muted small mb-2" th:text="${profile.user.email}">email</p>

                        <!-- Quick badges -->
                        <div class="mb-2">
                            <span class="badge bg-primary" th:text="${profile.course}">Course</span>
                            <span class="badge bg-info" th:text="${profile.yearOfStudy}">Year</span>
                        </div>
                        <div th:if="${profile.gender != null}">
                            <span class="badge bg-secondary" th:text="${profile.gender}">Gender</span>
                        </div>
                    </div>
                </div>

                <!-- ACTIONS CARD (only for PENDING) -->
                <div th:if="${profile.status.name() == 'PENDING'}" class="card shadow-sm border-0 mt-3">
                    <div class="card-body">
                        <h6 class="card-title text-uppercase small fw-bold text-muted">Actions</h6>

                        <!-- APPROVE -->
                        <form th:action="@{/admin/approve/{id}(id=${profile.id})}" method="post" class="mb-2">
                            <div class="mb-2">
                                <label class="form-label small fw-bold">Assign Room</label>
                                <select name="roomId" class="form-select form-select-sm">
                                    <option value="">No room</option>
                                    <option th:each="r : ${availableRooms}"
                                            th:value="${r.id}"
                                            th:text="${r.roomNumber + ' (' + r.roomType + ' - ₹' + r.monthlyRent + '/mo)'}">
                                    </option>
                                </select>
                            </div>
                            <button type="submit" class="btn btn-success w-100">
                                <i class="bi bi-check-circle"></i> Approve Admission
                            </button>
                        </form>

                        <!-- REJECT -->
                        <form th:action="@{/admin/reject/{id}(id=${profile.id})}" method="post">
                            <button type="submit" class="btn btn-outline-danger w-100"
                                    onclick="return confirm('Are you sure you want to reject this student?')">
                                <i class="bi bi-x-circle"></i> Reject Admission
                            </button>
                        </form>
                    </div>
                </div>

                <!-- ROOM INFO (if approved & assigned) -->
                <div th:if="${profile.room != null}" class="card shadow-sm border-0 mt-3">
                    <div class="card-body">
                        <h6 class="card-title text-uppercase small fw-bold text-muted">
                            <i class="bi bi-door-open"></i> Assigned Room
                        </h6>
                        <table class="table table-sm table-borderless mb-0">
                            <tr><td class="text-muted">Room No</td><td class="fw-bold" th:text="${profile.room.roomNumber}"></td></tr>
                            <tr><td class="text-muted">Type</td><td th:text="${profile.room.roomType}"></td></tr>
                            <tr><td class="text-muted">Floor</td><td th:text="${profile.room.floor}"></td></tr>
                            <tr><td class="text-muted">Rent</td><td>&#8377;<span th:text="${profile.room.monthlyRent}"></span>/month</td></tr>
                        </table>
                    </div>
                </div>
            </div>

            <!-- RIGHT COLUMN: Full Details -->
            <div class="col-md-8">

                <!-- PERSONAL INFORMATION -->
                <div class="card shadow-sm border-0 mb-3">
                    <div class="card-header bg-white border-0">
                        <h6 class="mb-0 text-uppercase small fw-bold text-muted">
                            <i class="bi bi-person-badge"></i> Personal Information
                        </h6>
                    </div>
                    <div class="card-body pt-0">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="text-muted small">Full Name</label>
                                <p class="fw-bold mb-0" th:text="${profile.user.name}">-</p>
                            </div>
                            <div class="col-md-6">
                                <label class="text-muted small">Email</label>
                                <p class="fw-bold mb-0" th:text="${profile.user.email}">-</p>
                            </div>
                            <div class="col-md-6">
                                <label class="text-muted small">Mobile Number</label>
                                <p class="fw-bold mb-0" th:text="${profile.phoneNumber}">-</p>
                            </div>
                            <div class="col-md-6" th:if="${profile.dateOfBirth != null}">
                                <label class="text-muted small">Date of Birth</label>
                                <p class="fw-bold mb-0" th:text="${profile.dateOfBirth}">-</p>
                            </div>
                            <div class="col-md-6" th:if="${profile.gender != null}">
                                <label class="text-muted small">Gender</label>
                                <p class="fw-bold mb-0" th:text="${profile.gender}">-</p>
                            </div>
                            <div class="col-md-6" th:if="${profile.aadharNumber != null}">
                                <label class="text-muted small">Aadhar Number</label>
                                <p class="fw-bold mb-0" th:text="${profile.aadharNumber}">-</p>
                            </div>
                            <div class="col-12">
                                <label class="text-muted small">Permanent Address</label>
                                <p class="fw-bold mb-0" th:text="${profile.address}">-</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- ACADEMIC DETAILS -->
                <div class="card shadow-sm border-0 mb-3">
                    <div class="card-header bg-white border-0">
                        <h6 class="mb-0 text-uppercase small fw-bold text-muted">
                            <i class="bi bi-mortarboard"></i> Academic Details
                        </h6>
                    </div>
                    <div class="card-body pt-0">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="text-muted small">College Name</label>
                                <p class="fw-bold mb-0" th:text="${profile.collegeName}">-</p>
                            </div>
                            <div class="col-md-6">
                                <label class="text-muted small">Course</label>
                                <p class="fw-bold mb-0" th:text="${profile.course}">-</p>
                            </div>
                            <div class="col-md-6">
                                <label class="text-muted small">Year of Study</label>
                                <p class="fw-bold mb-0" th:text="${profile.yearOfStudy}">-</p>
                            </div>
                            <div class="col-md-6" th:if="${profile.academicYear != null}">
                                <label class="text-muted small">Academic Year</label>
                                <p class="fw-bold mb-0" th:text="${profile.academicYear}">-</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- PARENT / GUARDIAN DETAILS -->
                <div class="card shadow-sm border-0 mb-3">
                    <div class="card-header bg-white border-0">
                        <h6 class="mb-0 text-uppercase small fw-bold text-muted">
                            <i class="bi bi-people"></i> Parent / Guardian Details
                        </h6>
                    </div>
                    <div class="card-body pt-0">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="text-muted small">Parent / Guardian Name</label>
                                <p class="fw-bold mb-0" th:text="${profile.parentName}">-</p>
                            </div>
                            <div class="col-md-6">
                                <label class="text-muted small">Parent Contact Number</label>
                                <p class="fw-bold mb-0" th:text="${profile.parentContact}">-</p>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>

    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
