<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login - Shivtirth Hostel</title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
</head>
<body class="d-flex flex-column min-vh-100" style="background:#f5f6fa;">
<div th:replace="~{fragments/header :: header}"></div>

<main class="flex-grow-1 d-flex align-items-center justify-content-center py-5">
    <div class="card shadow border-0" style="width: 100%; max-width: 420px;">
        <div class="card-body p-4">

            <!-- Admin badge (shown only when coming from /admin-login) -->
            <div th:if="${isAdminLogin}" class="alert alert-dark text-center py-2 mb-3">
                <i class="bi bi-gear"></i> Admin Login
            </div>

            <h4 class="text-center mb-1"
                th:text="${isAdminLogin} ? 'Admin Login' : 'Student Login'">Login</h4>
            <p class="text-center text-muted small mb-3">Enter your credentials to continue.</p>

            <!-- Success message (after logout or registration) -->
            <div th:if="${success}" class="alert alert-success py-2 text-center small"
                 th:text="${success}"></div>

            <!-- Error message (wrong password) -->
            <div th:if="${error}" class="alert alert-danger py-2 text-center small"
                 th:text="${error}"></div>

            <!--
              LOGIN FORM
              Spring Security processes this form automatically.
              - th:action adds CSRF token (security protection)
              - name="email" matches SecurityConfig's usernameParameter("email")
              - name="password" is the default password field
              - Posts to /loginForm (configured in SecurityConfig)
            -->
            <form th:action="@{/loginForm}" method="post">
                <div class="mb-3">
                    <label class="form-label small fw-bold">Email Address</label>
                    <input type="email" name="email" class="form-control"
                           placeholder="you@example.com" required/>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold">Password</label>
                    <input type="password" name="password" class="form-control"
                           placeholder="Your password" required/>
                </div>
                <button type="submit" class="btn btn-primary w-100 fw-bold">
                    Login <i class="bi bi-arrow-right"></i>
                </button>
            </form>

            <!-- Register link (hidden for admin login) -->
            <div th:unless="${isAdminLogin}" class="text-center mt-3 small text-muted">
                Don't have an account? <a href="/register">Register here</a>
            </div>
            <div th:if="${isAdminLogin}" class="text-center mt-3 small">
                <a href="/"><i class="bi bi-arrow-left"></i> Back to Home</a>
            </div>

        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
