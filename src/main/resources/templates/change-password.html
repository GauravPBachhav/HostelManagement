<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Change Password - Shivtirth Hostel</title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="d-flex flex-column min-vh-100">
<div th:replace="~{fragments/header :: header}"></div>

<main class="flex-grow-1 d-flex align-items-center justify-content-center py-5"
      style="background: var(--bg);">

    <div class="st-card st-animate-in" style="width: 100%; max-width: 460px;">
        <div class="p-4">

            <!-- Header -->
            <div class="text-center mb-3">
                <div style="width:56px; height:56px; border-radius:50%; background:linear-gradient(135deg,#ffd166,#e6a800); display:inline-flex; align-items:center; justify-content:center; margin-bottom:10px;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none"
                         stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.78 7.78 5.5 5.5 0 0 1 7.78-7.78zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/>
                    </svg>
                </div>
                <h4 class="fw-bold mb-0">Change Password</h4>
                <p class="text-muted small mb-0">Update your account password</p>
            </div>

            <!-- Alerts -->
            <div th:if="${success}" class="st-alert" style="background:rgba(6,214,160,0.1); border-left:4px solid #06d6a0; margin-bottom:12px;">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#06d6a0" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                <span class="small" th:text="${success}"></span>
            </div>
            <div th:if="${error}" class="st-alert" style="background:rgba(239,71,111,0.1); border-left:4px solid #ef476f; margin-bottom:12px;">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ef476f" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                <span class="small" th:text="${error}"></span>
            </div>

            <!-- Form -->
            <form th:action="@{/change-password}" method="post" id="changePasswordForm">
                <div class="mb-3">
                    <label class="st-form-label">Current Password</label>
                    <input type="password" name="currentPassword" class="form-control st-form-control"
                           placeholder="Enter your current password" required/>
                </div>
                <div class="mb-3">
                    <label class="st-form-label">New Password</label>
                    <input type="password" name="newPassword" id="newPassword" class="form-control st-form-control"
                           placeholder="Enter new password" minlength="4" required/>
                </div>
                <div class="mb-3">
                    <label class="st-form-label">Confirm New Password</label>
                    <input type="password" name="confirmPassword" id="confirmPassword" class="form-control st-form-control"
                           placeholder="Re-enter new password" required/>
                    <div id="matchError" class="small mt-1" style="display:none; color:var(--danger);">
                        Passwords do not match!
                    </div>
                </div>
                <button type="submit" class="btn st-btn st-btn-primary w-100 py-2" style="font-size:0.95rem;">
                    Update Password
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
                </button>
            </form>

            <div class="text-center mt-3">
                <a href="/dashboard" class="text-muted small">
                    <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                    Back to Dashboard
                </a>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
document.getElementById('changePasswordForm').addEventListener('submit', function(e) {
    var newPass = document.getElementById('newPassword').value;
    var confirmPass = document.getElementById('confirmPassword').value;
    var matchError = document.getElementById('matchError');
    if (newPass !== confirmPass) {
        e.preventDefault();
        matchError.style.display = 'block';
    } else {
        matchError.style.display = 'none';
    }
});
</script>
</body>
</html>
