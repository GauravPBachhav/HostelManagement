<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Contact Queries - Admin</title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <style>
        * { font-family:'Inter',sans-serif; }
        body { background:#f0f2f5; margin:0; overflow-x:hidden; }
        .sb { position:fixed; top:0; left:0; width:240px; height:100vh; background:#1a1a2e; color:#fff; display:flex; flex-direction:column; z-index:1000; transition:transform .3s; }
        .sb-brand { padding:24px 20px 18px; border-bottom:1px solid rgba(255,255,255,0.08); display:flex; align-items:center; gap:10px; }
        .sb-brand i { font-size:24px; color:#a78bfa; }
        .sb-brand span { font-size:18px; font-weight:800; letter-spacing:0.5px; }
        .sb-nav { flex:1; padding:12px 0; overflow-y:auto; }
        .sb-item { display:flex; align-items:center; gap:12px; padding:11px 22px; color:rgba(255,255,255,0.55); font-size:14px; font-weight:500; cursor:pointer; border-left:3px solid transparent; transition:all .2s; text-decoration:none; }
        .sb-item:hover { color:#fff; background:rgba(255,255,255,0.06); }
        .sb-item.active { color:#fff; background:rgba(167,139,250,0.15); border-left-color:#a78bfa; }
        .sb-item i { font-size:17px; width:22px; text-align:center; }
        .sb-sep { height:1px; background:rgba(255,255,255,0.08); margin:8px 20px; }
        .sb-footer { padding:16px 20px; border-top:1px solid rgba(255,255,255,0.08); }
        .main { margin-left:240px; min-height:100vh; }
        .top-bar { background:#fff; padding:14px 28px; display:flex; align-items:center; gap:16px; border-bottom:1px solid #e5e7eb; position:sticky; top:0; z-index:100; }
        .top-bar .right { margin-left:auto; display:flex; align-items:center; gap:12px; }
        .content { padding:20px 28px; }
        .stat-row { display:grid; grid-template-columns:repeat(2,1fr); gap:16px; margin-bottom:20px; max-width:500px; }
        .stat-card { border-radius:14px; padding:18px 20px; display:flex; align-items:center; gap:14px; }
        .stat-card .icon { width:48px; height:48px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:22px; }
        .stat-card h3 { margin:0; font-size:26px; font-weight:800; }
        .stat-card small { color:#666; font-size:12px; font-weight:500; }
        .sb-toggle { display:none; background:none; border:none; font-size:24px; color:#333; cursor:pointer; }
        @media(max-width:991px) {
            .sb { transform:translateX(-100%); }
            .sb.open { transform:translateX(0); }
            .main { margin-left:0; }
            .content { padding:16px; }
            .stat-row { grid-template-columns:1fr; }
            .sb-toggle { display:block; }
            .sb-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.4); z-index:999; display:none; }
            .sb-overlay.show { display:block; }
        }
    </style>
</head>
<body>
<div class="sb-overlay" id="sbOverlay" onclick="toggleSidebar()"></div>
<aside class="sb" id="sidebar">
    <div class="sb-brand"><i class="bi bi-building"></i><span>HOSTEL</span></div>
    <nav class="sb-nav">
        <a class="sb-item" href="/admin/dashboard"><i class="bi bi-speedometer2"></i> Dashboard</a>
        <div class="sb-sep"></div>
        <a class="sb-item" href="/admin/facilities"><i class="bi bi-image"></i> Facilities</a>
        <a class="sb-item" href="/admin/records"><i class="bi bi-archive"></i> Records</a>
    </nav>
    <div class="sb-footer">
        <form action="/logout" method="post" style="margin:0;">
            <button type="submit" style="background:none;border:none;cursor:pointer;color:rgba(255,255,255,0.5);font-size:13px;display:flex;align-items:center;gap:8px;padding:0;font-family:inherit;">
                <i class="bi bi-box-arrow-left"></i> Logout
            </button>
        </form>
    </div>
</aside>

<div class="main">
    <div class="top-bar">
        <button class="sb-toggle" onclick="toggleSidebar()"><i class="bi bi-list"></i></button>
        <h6 class="mb-0 fw-bold"><i class="bi bi-chat-dots"></i> Contact Queries</h6>
        <div class="right">
            <a href="/admin/dashboard" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i> Dashboard</a>
        </div>
    </div>

    <div class="content">
        <!-- Flash Messages -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle"></i> <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Stats -->
        <div class="stat-row">
            <div class="stat-card" style="background:linear-gradient(135deg,#dbeafe,#bfdbfe);">
                <div class="icon" style="background:#3b82f6;color:#fff;"><i class="bi bi-chat-dots"></i></div>
                <div>
                    <h3 th:text="${#lists.size(queries)}">0</h3>
                    <small>Total Queries</small>
                </div>
            </div>
            <div class="stat-card" style="background:linear-gradient(135deg,#fecaca,#fda4af);">
                <div class="icon" style="background:#ef4444;color:#fff;"><i class="bi bi-exclamation-circle"></i></div>
                <div>
                    <h3 th:text="${openCount}">0</h3>
                    <small>Not Contacted</small>
                </div>
            </div>
        </div>

        <!-- Queries Table -->
        <div class="card shadow-sm border-0">
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th>#</th><th>Name</th><th>Mobile</th><th>Email</th>
                            <th>Message</th><th>Date</th><th>Status</th><th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${#lists.isEmpty(queries)}">
                            <td colspan="8" class="text-center text-muted py-4">No contact queries yet.</td>
                        </tr>
                        <tr th:each="q, idx : ${queries}">
                            <td th:text="${idx.count}">1</td>
                            <td><strong th:text="${q.name}">Name</strong></td>
                            <td><a th:href="'tel:' + ${q.mobile}" th:text="${q.mobile}" class="text-decoration-none">-</a></td>
                            <td><a th:href="'mailto:' + ${q.email}" th:text="${q.email}" class="text-decoration-none" style="font-size:0.85rem;">-</a></td>
                            <td><small class="text-muted" th:text="${q.message != null ? q.message : '—'}">-</small></td>
                            <td><small th:text="${#temporals.format(q.createdAt, 'dd MMM yy, hh:mm a')}">-</small></td>
                            <td>
                                <span th:if="${q.status.name() == 'OPEN'}" class="badge bg-danger">NOT CONTACTED</span>
                                <span th:if="${q.status.name() == 'RESOLVED'}" class="badge bg-success">CONTACTED ✓</span>
                            </td>
                            <td>
                                <div class="d-flex gap-1">
                                    <form th:action="@{/admin/contact-queries/toggle/{id}(id=${q.id})}" method="post" class="d-inline">
                                        <button type="submit" class="btn btn-sm"
                                                th:classappend="${q.status.name() == 'OPEN'} ? 'btn-outline-success' : 'btn-outline-warning'"
                                                th:text="${q.status.name() == 'OPEN'} ? 'Mark Contacted' : 'Reopen'">
                                        </button>
                                    </form>
                                    <form th:action="@{/admin/contact-queries/delete/{id}(id=${q.id})}" method="post" class="d-inline">
                                        <button type="submit" class="btn btn-outline-danger btn-sm" onclick="return confirm('Delete this query?')">
                                            <i class="bi bi-trash"></i>
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sbOverlay').classList.toggle('show');
}
</script>
</body>
</html>
