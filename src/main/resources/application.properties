# ====================================
# DATABASE (use env vars in production)
# ====================================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/hostel_db}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:Gaurav2310}

# In development: use 'update' to auto-create tables
# In production:  change to 'validate' (never auto-modify schema)
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

spring.thymeleaf.cache=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# File upload settings
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB

# Tomcat settings to prevent HTTP 413 error
server.tomcat.max-swallow-size=-1
server.tomcat.max-http-form-post-size=-1

# ====================================
# EMAIL CONFIGURATION (Gmail SMTP)
